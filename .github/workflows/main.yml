name: NewsPush Daily

on:
  schedule:
    - cron: '0 0 * * *'    # 北京时间每天 8:00
    - cron: '0 6 * * *'    # 北京时间每天 14:00
  workflow_dispatch:
    inputs:
      max_analyze:
        description: '最多分析多少条新闻'
        required: false
        default: '5'
        type: string

jobs:
  newspush:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Debug Environment Variables
        run: |
          echo "=== Secrets Debug ==="
          echo "DASHSCOPE_API_KEY set: ${{ secrets.DASHSCOPE_API_KEY != '' }}"
          echo "WECHAT_APPID set: ${{ secrets.WECHAT_APPID != '' }}"
          echo "WECHAT_SECRET set: ${{ secrets.WECHAT_SECRET != '' }}"
          echo "====================="

      - name: Create directories
        run: mkdir -p data results downloads

      - name: Run NewsPush
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "=== 开始执行 NewsPush ==="
          python -u main.py --once --analyze ${{ inputs.max_analyze || '5' }}
          echo "=== Python 脚本执行完毕 ==="

      - name: Cleanup
        if: always()
        run: rm -rf data results downloads
