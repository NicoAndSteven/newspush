name: NewsPush Daily

on:
  schedule:
    - cron: '0 0 * * *'      # 北京时间每天早上 8:00
    - cron: '0 6 * * *'      # 北京时间每天下午 14:00
  workflow_dispatch:
    inputs:
      max_analyze:
        description: '最多分析多少条新闻'
        required: false
        default: '5'
        type: string
      no_cleanup:
        description: '不清理存储（保留临时文件）'
        required: false
        default: false
        type: boolean

jobs:
  newspush:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create necessary directories
        run: mkdir -p data results downloads

      # ←←← 重点在这里：把 env 放到这个 step 里
      - name: Run NewsPush
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python main.py \
            --once \
            --analyze ${{ inputs.max_analyze || '5' }}

      - name: Cleanup workspace
        if: always()
        run: |
          echo "=== 开始清理工作区 ==="
          rm -rf data results downloads
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true
          echo "=== 清理后的目录结构 ==="
          ls -la
          echo "======================"
          echo "Workspace cleaned up."
