{% extends "base.html" %}

{% block title %}新闻列表 - NewsPush{% endblock %}

{% block content %}
<div class="card">
    <h2>📰 最近新闻</h2>
    
    <!-- 抓取控制面板 -->
    <div style="margin-bottom: 1.5rem; padding: 1rem; background: #f8f9fa; border-radius: 8px;">
        <h3 style="margin-bottom: 0.75rem; font-size: 1rem;">抓取设置</h3>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
            <div>
                <label style="font-size: 0.875rem; color: #666;">分类：</label>
                <select id="fetch-category">
                    <option value="all">全部</option>
                    <option value="international">国际</option>
                    <option value="technology">科技</option>
                    <option value="business">商业</option>
                    <option value="science">科学</option>
                </select>
            </div>
            <div>
                <label style="font-size: 0.875rem; color: #666;">每源数量：</label>
                <select id="fetch-per-source">
                    <option value="3" selected>3条</option>
                    <option value="5">5条</option>
                    <option value="10">10条</option>
                </select>
            </div>
            <div>
                <label style="font-size: 0.875rem; color: #666;">总数量限制：</label>
                <select id="fetch-total">
                    <option value="10" selected>10条</option>
                    <option value="20">20条</option>
                    <option value="50">50条</option>
                </select>
            </div>
            <div style="display: flex; align-items: center;">
                <input type="checkbox" id="fetch-full-content" style="margin-right: 0.5rem;">
                <label for="fetch-full-content" style="font-size: 0.875rem; color: #666;">抓取完整内容（慢但内容更丰富）</label>
            </div>
        </div>
    </div>
    
    <div style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <label>时间范围：</label>
            <select id="hours" onchange="loadNews()">
                <option value="24">24小时</option>
                <option value="48">48小时</option>
                <option value="72">3天</option>
                <option value="168">7天</option>
            </select>
            <button class="btn" onclick="loadNews()" style="margin-left: 1rem;">刷新</button>
        </div>
        <div>
            <button class="btn" onclick="deleteAllNews()" style="background: #dc3545; margin-right: 0.5rem;">清空所有</button>
            <button class="btn btn-success" onclick="fetchNews()">抓取新闻</button>
        </div>
    </div>
    <div id="news-list">
        <p>正在加载...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadNews() {
    const hours = document.getElementById('hours').value;
    const newsList = document.getElementById('news-list');
    newsList.innerHTML = '<p>正在加载...</p>';
    
    try {
        const response = await fetch(`/api/news/recent?hours=${hours}`);
        const data = await response.json();
        
        if (data.status === 'success') {
            if (data.news.length === 0) {
                newsList.innerHTML = `
                    <div style="text-align: center; padding: 3rem;">
                        <p style="color: #666; margin-bottom: 1rem;">暂无新闻</p>
                        <button class="btn btn-success" onclick="fetchNews()">立即抓取新闻</button>
                    </div>
                `;
                return;
            }
            
            let html = `<p style="color: #666; margin-bottom: 1rem;">共 ${data.count} 条新闻</p>`;
            data.news.forEach((item, index) => {
                html += `
                    <div class="news-item">
                        <h3>${escapeHtml(item.title)}</h3>
                        <div class="meta">
                            <span class="tag">${item.source}</span>
                            <span class="tag">${item.category}</span>
                            <span>${new Date(item.published).toLocaleString()}</span>
                            ${item.ai_score > 0 ? `<span class="tag tag-primary">AI评分: ${item.ai_score}</span>` : ''}
                            ${item.is_video_worthy ? '<span class="tag tag-success">适合视频</span>' : ''}
                        </div>
                        <p>${escapeHtml(item.description.substring(0, 200))}...</p>
                        <div class="actions">
                            <a href="${item.link}" target="_blank" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">查看原文</a>
                            <button onclick="analyzeNews('${encodeURIComponent(item.title)}', '${encodeURIComponent(item.link)}', '${encodeURIComponent(item.description)}', '${encodeURIComponent(item.full_content || '')}')" class="btn" style="padding: 0.5rem 1rem; font-size: 0.875rem;">分析</button>
                        </div>
                    </div>
                `;
            });
            newsList.innerHTML = html;
        } else {
            newsList.innerHTML = '<p class="alert alert-error">加载失败</p>';
        }
    } catch (error) {
        console.error('加载新闻失败:', error);
        newsList.innerHTML = '<p class="alert alert-error">加载失败: ' + error.message + '</p>';
    }
}

async function fetchNews() {
    const btn = document.querySelector('.btn-success');
    const originalText = btn.textContent;
    btn.textContent = '抓取中...(最多等待30秒)';
    btn.disabled = true;
    
    // 获取设置
    const category = document.getElementById('fetch-category').value;
    const perSource = parseInt(document.getElementById('fetch-per-source').value);
    const totalLimit = parseInt(document.getElementById('fetch-total').value);
    const fetchFullContent = document.getElementById('fetch-full-content').checked;
    
    try {
        const response = await fetch('/api/news/fetch', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                category: category,
                max_items_per_source: perSource,
                max_total_news: totalLimit,
                fetch_full_content: fetchFullContent
            })
        });
        
        const data = await response.json();
        
        if (data.status === 'success') {
            // 构建详细提示
            let msg = data.message;
            if (data.summary && (data.summary.timeout > 0 || data.summary.connection_error > 0)) {
                msg += '\n\n详细统计：';
                msg += `\n- 成功: ${data.summary.success}/${data.summary.total}`;
                if (data.summary.timeout > 0) {
                    msg += `\n- 超时: ${data.summary.timeout}`;
                }
                if (data.summary.connection_error > 0) {
                    msg += `\n- 连接失败: ${data.summary.connection_error} (可能需要VPN)`;
                }
            }
            alert(msg);
            loadNews(); // 刷新列表
        } else {
            alert('抓取失败: ' + data.message);
        }
    } catch (error) {
        alert('抓取失败: ' + error.message);
    } finally {
        btn.textContent = originalText;
        btn.disabled = false;
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function analyzeNews(encodedTitle, encodedLink, encodedDescription, encodedFullContent) {
    const title = decodeURIComponent(encodedTitle);
    const link = decodeURIComponent(encodedLink);
    const description = decodeURIComponent(encodedDescription);
    let fullContent = decodeURIComponent(encodedFullContent);
    
    // 如果有完整内容，直接使用
    if (fullContent && fullContent.length > 100) {
        window.location.href = `/analysis?title=${encodeURIComponent(title)}&content=${encodeURIComponent(fullContent)}`;
        return;
    }
    
    // 否则尝试获取完整内容
    try {
        const response = await fetch(`/api/news/full-content?link=${encodeURIComponent(link)}`);
        const data = await response.json();
        
        if (data.status === 'success') {
            window.location.href = `/analysis?title=${encodeURIComponent(title)}&content=${encodeURIComponent(data.content)}`;
        } else {
            // 如果获取失败，使用摘要
            window.location.href = `/analysis?title=${encodeURIComponent(title)}&content=${encodeURIComponent(description)}`;
        }
    } catch (error) {
        console.error('获取完整内容失败:', error);
        // 使用摘要作为后备
        window.location.href = `/analysis?title=${encodeURIComponent(title)}&content=${encodeURIComponent(description)}`;
    }
}

async function deleteAllNews() {
    if (!confirm('确定要清空所有新闻吗？此操作不可恢复！')) {
        return;
    }
    
    try {
        const response = await fetch('/api/news/delete', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ links: [] })  // 空数组表示删除所有
        });
        
        const data = await response.json();
        
        if (data.status === 'success') {
            alert(data.message);
            loadNews(); // 刷新列表
        } else {
            alert('删除失败: ' + data.message);
        }
    } catch (error) {
        alert('删除失败: ' + error.message);
    }
}

// 页面加载时获取数据
loadNews();
</script>
{% endblock %}
