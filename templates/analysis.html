{% extends "base.html" %}

{% block title %}新闻分析 - NewsPush{% endblock %}

{% block content %}
<div class="card">
    <h2>🔍 新闻分析</h2>
    <form id="analysis-form">
        <div class="form-group">
            <label>新闻标题</label>
            <input type="text" id="title" placeholder="输入新闻标题" required>
        </div>
        <div class="form-group">
            <label>新闻内容</label>
            <textarea id="content" placeholder="输入新闻内容" rows="6" required></textarea>
        </div>
        <div class="form-group">
            <label>点评风格</label>
            <select id="style">
                <option value="balanced">客观平衡</option>
                <option value="critical">批判性思维</option>
                <option value="optimistic">积极乐观</option>
                <option value="provocative">观点鲜明</option>
                <option value="storytelling">讲故事风格</option>
            </select>
        </div>
        <button type="submit" class="btn">开始分析</button>
    </form>
</div>

<div id="result" style="display: none;">
    <div class="card">
        <h2>📊 分析结果</h2>
        <div id="analysis-content"></div>
    </div>
    
    <div class="card">
        <h2>📝 新闻点评</h2>
        <div id="commentary-content"></div>
    </div>
    
    <div class="card">
        <h2>📤 发布到多平台</h2>
        <div class="form-group">
            <label>选择平台：</label>
            <div>
                <label class="platform-checkbox">
                    <input type="checkbox" value="wechat" checked> 微信公众号
                </label>
                <label class="platform-checkbox">
                    <input type="checkbox" value="xiaohongshu" checked> 小红书
                </label>
                <label class="platform-checkbox">
                    <input type="checkbox" value="weibo"> 微博
                </label>
                <label class="platform-checkbox">
                    <input type="checkbox" value="zhihu"> 知乎
                </label>
            </div>
        </div>
        <button onclick="publish()" class="btn btn-success">立即发布</button>
        <div id="publish-result"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentAnalysis = null;
let currentCommentary = null;

// 从 URL 参数填充
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const content = params.get('content');
    if (title) document.getElementById('title').value = title;
    if (content) document.getElementById('content').value = content;
};

document.getElementById('analysis-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    const style = document.getElementById('style').value;
    
    const resultDiv = document.getElementById('result');
    const analysisContent = document.getElementById('analysis-content');
    const commentaryContent = document.getElementById('commentary-content');
    
    resultDiv.style.display = 'none';
    analysisContent.innerHTML = '<div class="loading"></div> 正在分析...';
    commentaryContent.innerHTML = '<div class="loading"></div> 正在生成点评...';
    
    try {
        // 调用点评 API（包含分析）
        const response = await fetch('/api/news/commentary', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                news_title: title,
                news_content: content,
                style: style
            })
        });
        
        const data = await response.json();
        
        if (data.status === 'success') {
            currentAnalysis = data.analysis;
            currentCommentary = data.commentary;
            
            // 显示分析结果
            analysisContent.innerHTML = `
                <p><strong>类型：</strong>${data.analysis.content_type}</p>
                <p><strong>紧急度：</strong>${data.analysis.urgency_level}/10</p>
                <p><strong>总结：</strong>${data.analysis.summary}</p>
                <h4>核心要点：</h4>
                <ul>
                    ${data.analysis.key_points.map(p => `<li>${p}</li>`).join('')}
                </ul>
                <h4>独特角度：</h4>
                <p>${data.analysis.unique_angle}</p>
                <h4>推荐平台：</h4>
                <p>${data.analysis.suggested_platforms.join(', ')}</p>
            `;
            
            // 显示点评
            commentaryContent.innerHTML = `<pre style="white-space: pre-wrap; font-family: inherit; line-height: 1.8;">${data.commentary}</pre>`;
            
            resultDiv.style.display = 'block';
        } else {
            analysisContent.innerHTML = '<p class="alert alert-error">分析失败</p>';
        }
    } catch (error) {
        console.error('分析失败:', error);
        analysisContent.innerHTML = '<p class="alert alert-error">分析失败: ' + error.message + '</p>';
    }
});

async function publish() {
    const checkboxes = document.querySelectorAll('.platform-checkbox input:checked');
    const platforms = Array.from(checkboxes).map(cb => cb.value);
    
    if (platforms.length === 0) {
        alert('请至少选择一个平台');
        return;
    }
    
    if (!currentAnalysis) {
        alert('请先进行分析');
        return;
    }
    
    const resultDiv = document.getElementById('publish-result');
    resultDiv.innerHTML = '<div class="loading"></div> 正在发布...';
    
    try {
        const response = await fetch('/api/news/publish', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                analysis_result: currentAnalysis,
                platforms: platforms
            })
        });
        
        const data = await response.json();
        
        if (data.status === 'success') {
            resultDiv.innerHTML = `<p class="alert alert-success">发布任务已创建！任务ID: ${data.task_id}</p>`;
        } else {
            resultDiv.innerHTML = '<p class="alert alert-error">发布失败</p>';
        }
    } catch (error) {
        console.error('发布失败:', error);
        resultDiv.innerHTML = '<p class="alert alert-error">发布失败: ' + error.message + '</p>';
    }
}
</script>
{% endblock %}
