{% extends "base.html" %}

{% block title %}发布管理 - NewsPush{% endblock %}

{% block content %}
<div class="card">
    <h2>📤 快速发布</h2>
    <form id="quick-publish-form">
        <div class="form-group">
            <label>新闻标题</label>
            <input type="text" id="title" placeholder="输入新闻标题" required>
        </div>
        <div class="form-group">
            <label>新闻内容</label>
            <textarea id="content" placeholder="输入新闻内容" rows="6" required></textarea>
        </div>
        <div class="form-group">
            <label>点评风格</label>
            <select id="style">
                <option value="balanced">客观平衡</option>
                <option value="critical">批判性思维</option>
                <option value="optimistic">积极乐观</option>
                <option value="provocative">观点鲜明</option>
            </select>
        </div>
        <div class="form-group">
            <label>发布平台：</label>
            <div>
                <label class="platform-checkbox">
                    <input type="checkbox" value="wechat" checked> 微信公众号
                </label>
                <label class="platform-checkbox">
                    <input type="checkbox" value="xiaohongshu" checked> 小红书
                </label>
                <label class="platform-checkbox">
                    <input type="checkbox" value="weibo"> 微博
                </label>
                <label class="platform-checkbox">
                    <input type="checkbox" value="zhihu"> 知乎
                </label>
            </div>
        </div>
        <button type="submit" class="btn btn-success">一键发布（分析+点评+发布）</button>
    </form>
    <div id="quick-result"></div>
</div>

<div class="card">
    <h2>📋 发布任务</h2>
    <button class="btn" onclick="loadTasks()" style="margin-bottom: 1rem;">刷新任务列表</button>
    <div id="tasks-list">
        <p>点击刷新加载任务...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('quick-publish-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    const style = document.getElementById('style').value;
    
    const checkboxes = document.querySelectorAll('.platform-checkbox input:checked');
    const platforms = Array.from(checkboxes).map(cb => cb.value);
    
    if (platforms.length === 0) {
        alert('请至少选择一个平台');
        return;
    }
    
    const resultDiv = document.getElementById('quick-result');
    resultDiv.innerHTML = '<div class="loading"></div> 正在执行完整流程（分析 → 点评 → 发布）...';
    
    try {
        const response = await fetch('/api/workflow/full', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                news_title: title,
                news_content: content,
                platforms: platforms,
                style: style
            })
        });
        
        const data = await response.json();
        
        if (data.status === 'success') {
            const workflow = data.workflow;
            let html = '<div class="alert alert-success" style="margin-top: 1rem;">';
            html += '<h3>✅ 流程执行成功！</h3>';
            
            // 分析结果
            html += '<h4>📊 分析结果</h4>';
            html += `<p><strong>类型：</strong>${workflow.analysis.content_type}</p>`;
            html += `<p><strong>紧急度：</strong>${workflow.analysis.urgency_level}/10</p>`;
            html += `<p><strong>推荐平台：</strong>${workflow.analysis.suggested_platforms.join(', ')}</p>`;
            
            // 点评预览
            html += '<h4>📝 点评预览</h4>';
            html += `<pre style="white-space: pre-wrap; font-family: inherit; background: #f8f9fa; padding: 1rem; border-radius: 4px; max-height: 200px; overflow-y: auto;">${workflow.commentary.substring(0, 500)}...</pre>`;
            
            // 发布结果
            html += '<h4>📤 发布结果</h4>';
            html += '<ul>';
            for (const [platform, result] of Object.entries(workflow.publish_results)) {
                const icon = result.status === 'success' ? '✅' : '❌';
                html += `<li>${icon} ${platform}: ${result.status}`;
                if (result.post_url) {
                    html += ` <a href="${result.post_url}" target="_blank">查看</a>`;
                }
                if (result.error) {
                    html += ` <span style="color: red;">(${result.error})</span>`;
                }
                html += '</li>';
            }
            html += '</ul>';
            
            html += `<p><strong>任务ID：</strong>${workflow.publish_task_id}</p>`;
            html += '</div>';
            
            resultDiv.innerHTML = html;
            
            // 刷新任务列表
            loadTasks();
        } else {
            resultDiv.innerHTML = '<p class="alert alert-error">流程执行失败</p>';
        }
    } catch (error) {
        console.error('流程执行失败:', error);
        resultDiv.innerHTML = '<p class="alert alert-error">流程执行失败: ' + error.message + '</p>';
    }
});

async function loadTasks() {
    const tasksList = document.getElementById('tasks-list');
    tasksList.innerHTML = '<p>正在加载...</p>';
    
    try {
        const response = await fetch('/api/tasks/pending');
        const data = await response.json();
        
        if (data.status === 'success') {
            if (data.tasks.length === 0) {
                tasksList.innerHTML = '<p>暂无待处理任务</p>';
                return;
            }
            
            let html = '<table style="width: 100%; border-collapse: collapse;">';
            html += '<thead><tr style="border-bottom: 2px solid #ddd;">';
            html += '<th style="text-align: left; padding: 0.5rem;">ID</th>';
            html += '<th style="text-align: left; padding: 0.5rem;">标题</th>';
            html += '<th style="text-align: left; padding: 0.5rem;">平台</th>';
            html += '<th style="text-align: left; padding: 0.5rem;">创建时间</th>';
            html += '</tr></thead><tbody>';
            
            data.tasks.forEach(task => {
                html += '<tr style="border-bottom: 1px solid #eee;">';
                html += `<td style="padding: 0.5rem;">${task.id}</td>`;
                html += `<td style="padding: 0.5rem;">${escapeHtml(task.news_title.substring(0, 50))}...</td>`;
                html += `<td style="padding: 0.5rem;">${task.platforms.join(', ')}</td>`;
                html += `<td style="padding: 0.5rem;">${new Date(task.created_at).toLocaleString()}</td>`;
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            tasksList.innerHTML = html;
        } else {
            tasksList.innerHTML = '<p class="alert alert-error">加载失败</p>';
        }
    } catch (error) {
        console.error('加载任务失败:', error);
        tasksList.innerHTML = '<p class="alert alert-error">加载失败: ' + error.message + '</p>';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 页面加载时获取任务
loadTasks();
</script>
{% endblock %}
